<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tablero - Sticky Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Gochi+Hand&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-background-light font-display text-slate-900 min-h-screen flex flex-col">

    <div class="flex-1 overflow-hidden h-screen flex flex-col">
        <header class="flex items-center justify-between px-8 py-3 bg-white sticky top-0 z-50 shadow">
            <h2 class="text-xl font-bold">Mis Notas</h2>
            <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded font-bold hover:bg-red-600">Cerrar Sesión</button>
        </header>

        <main class="flex-1 relative flex flex-col">
            <div class="p-8 bg-white z-10 shadow-sm flex gap-4">
                <input id="new-note-title" type="text" placeholder="Título de la nota" class="border p-2 rounded w-1/3 form-input">
                <input id="new-note-content" type="text" placeholder="Contenido..." class="border p-2 rounded w-1/3 form-input">
                <button id="create-note-btn" class="bg-[#eebd2b] text-slate-900 px-6 py-2 rounded-full font-bold hover:opacity-90">Crear Nota</button>
                <p id="note-error" class="text-red-600 font-bold mt-4 hidden"></p>
            </div>
            
            <div id="notes-container" class="flex-1 p-8 cork-texture overflow-y-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8 content-start">
                </div>
        </main>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
